name: Release

# Changesets-driven release for @xpndui/ui.
#
# On push to main:
#   - if there are pending changesets, opens/updates a "Version Packages" PR
#     (bumps versions + writes CHANGELOG.md)
#   - when that PR is merged (no pending changesets, a new version to ship),
#     builds and publishes to npm via Trusted Publishing (OIDC) with provenance
#
# One-time repo setup:
#   - Settings → Actions → General → Workflow permissions:
#       "Read and write permissions" + "Allow GitHub Actions to create and
#       approve pull requests"
#   - Allowed actions (if restricted): pnpm/action-setup@*, changesets/action@*
#   - npm: package Trusted Publisher = this repo + workflow "release.yml"

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push the version PR, tags, and GitHub releases
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm Trusted Publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing needs a recent npm (>= 11.5.1)
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
